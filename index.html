<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Sistema de gestão e ordens de serviço da Salvateck" />

  <meta name="theme-color" content="#0D3861" />

  <!-- Configurações PWA -->
  <meta name="mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-capable" content="yes" />

  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <meta name="apple-mobile-web-app-title" content="Salvateck" />

  <title>
    Salvateck | Sistema de Gestão
  </title>

  <!-- Manifesto PWA -->
  <link rel="manifest" href="./manifest.json?v=1.0.1" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/icons/favicon-32-v2.png" />

  <!-- Ícone para iPhone e iPad -->
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/apple-touch-icon-v2.png" />

  <!-- Fonte Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="./css/base.css?v=1.0.0" />

  <link rel="stylesheet" href="./css/index.css?v=1.0.1" />
</head>

<body data-page="index">

  <main class="login-shell">

    <section class="login-hero">

      <div class="login-decoration login-decoration--top"></div>

      <div class="login-decoration login-decoration--bottom"></div>

      <div class="login-content">

        <div class="login-logo">

          <img src="./assets/logo.salvateck-v2.png" alt="Logo da Salvateck" />

        </div>

        <div class="login-copy">

          <span class="login-eyebrow">
            Salvateck Group
          </span>

          <h1>
            Gestão inteligente para cada serviço
          </h1>

          <p>
            Solicitações, ordens de serviço, agenda e
            controle em um só lugar.
          </p>

        </div>

        <div class="login-actions">

          <a href="./login.html" class="login-button login-button--primary">
            Login

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14"></path>
              <path d="m13 6 6 6-6 6"></path>
            </svg>
          </a>

          <a href="./registre-se.html" class="login-button login-button--secondary">
            Registre-se

            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="9" cy="8" r="4"></circle>

              <path d="M3 21a6 6 0 0 1 12 0"></path>

              <path d="M19 8v6"></path>
              <path d="M16 11h6"></path>
            </svg>
          </a>

        </div>

      </div>

      <footer class="login-footer">

        <span>
          Salvateck
        </span>

        <span class="login-footer__divider"></span>

        <span>
          Sistema de Gestão
        </span>

      </footer>

    </section>

  </main>

  <!-- Registro do Service Worker -->
  <script src="./js/pwa.js?v=1.0.0" defer></script>

</body>

</html>

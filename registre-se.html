<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Crie sua conta no Sistema de Gestão Salvateck" />

  <meta name="theme-color" content="#0D3861" />

  <title>Registre-se | Salvateck</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page" data-page="register">

  <main class="auth-shell">

    <section class="auth-hero">

      <div class="auth-decoration auth-decoration--top"></div>

      <div class="auth-decoration auth-decoration--bottom"></div>

      <header class="auth-header">

        <a href="index.html" class="auth-back-button" aria-label="Voltar para a página inicial">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m15 18-6-6 6-6"></path>
          </svg>
        </a>

        <div class="auth-header__brand">

          <span>
            Salvateck Group
          </span>

          <strong>
            Novo cadastro
          </strong>

        </div>

        <div class="auth-header__logo">

          <img src="assets/logo.salvateck.png" alt="Logo da Salvateck" />

        </div>

      </header>

      <div class="auth-content">

        <div class="auth-intro">

          <span class="auth-intro__badge">
            Área do cliente
          </span>

          <h1>
            Crie sua conta
          </h1>

          <p>
            Cadastre seus dados para solicitar serviços
            e acompanhar seus atendimentos.
          </p>

        </div>

        <section class="auth-card">

          <form id="register-form" novalidate>

            <div class="auth-field">

              <label for="register-name">
                Nome completo
              </label>

              <div class="auth-input">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="8" r="4"></circle>
                  <path d="M4 21a8 8 0 0 1 16 0"></path>
                </svg>

                <input type="text" id="register-name" name="name" placeholder="Digite seu nome completo" autocomplete="name" required />

              </div>

            </div>

            <div class="auth-field">

              <label for="register-email">
                E-mail
              </label>

              <div class="auth-input">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="3" y="5" width="18" height="14" rx="2"></rect>

                  <path d="m4 7 8 6 8-6"></path>
                </svg>

                <input type="email" id="register-email" name="email" placeholder="seuemail@exemplo.com" autocomplete="email" inputmode="email" required />

              </div>

            </div>

            <div class="auth-field">

              <label for="register-phone">
                Telefone ou WhatsApp
              </label>

              <div class="auth-input">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 4h4l2 5-3 2a14 14 0 0 0 5 5l2-3 5 2v4c0 1-1 2-2 2C10 21 3 14 3 6c0-1 1-2 2-2Z"></path>
                </svg>

                <input type="tel" id="register-phone" name="phone" placeholder="(11) 99999-9999" autocomplete="tel" inputmode="numeric" maxlength="15" required />

              </div>

            </div>

            <div class="auth-field">

              <label for="register-password">
                Senha
              </label>

              <div class="auth-input">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="10" width="16" height="11" rx="2"></rect>

                  <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
                </svg>

                <input type="password" id="register-password" name="password" placeholder="Crie uma senha" autocomplete="new-password" minlength="8" required />

                <button type="button" class="auth-password-toggle" id="register-password-toggle" aria-label="Mostrar senha" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                    <circle cx="12" cy="12" r="2.5"></circle>
                  </svg>
                </button>

              </div>

              <small>
                Use pelo menos 8 caracteres.
              </small>

            </div>

            <div class="auth-field">

              <label for="register-password-confirmation">
                Confirmar senha
              </label>

              <div class="auth-input">

                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m5 12 4 4L19 6"></path>
                </svg>

                <input type="password" id="register-password-confirmation" name="passwordConfirmation" placeholder="Digite novamente" autocomplete="new-password" minlength="8" required />

              </div>

            </div>

            <button type="submit" class="auth-submit-button" id="register-submit-button">
              <span>
                Criar minha conta
              </span>

              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14"></path>
                <path d="m13 6 6 6-6 6"></path>
              </svg>
            </button>

          </form>

          <div class="auth-feedback" id="auth-feedback" role="alert" hidden></div>

          <div class="auth-card__footer">

            <span>
              Já possui uma conta?
            </span>

            <a href="login.html">
              Fazer login
            </a>

          </div>

        </section>

      </div>

      <footer class="auth-footer">
        <span>Salvateck</span>
        <span class="auth-footer__divider"></span>
        <span>Sistema de Gestão</span>
      </footer>

    </section>

  </main>

  <script type="module" src="js/registre-se.js"></script>

</body>

</html>
